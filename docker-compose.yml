version: '3.8'

services:
  # Main PDF Bot Service
  pdf-bot:
    build: 
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pdf_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://pdfbot:password@postgres:5432/pdfbot
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - bot_sessions:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - pdf_bot_internal
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: pdf_bot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - pdf_bot_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # PostgreSQL for persistent data
  postgres:
    image: postgres:15-alpine
    container_name: pdf_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdfbot
      POSTGRES_USER: pdfbot
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - pdf_bot_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfbot -d pdfbot"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: pdf_bot_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - pdf_bot_internal
      - pdf_bot_external
    ports:
      - "9090:9090"
    profiles: ["monitoring"]

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: pdf_bot_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - pdf_bot_external
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    profiles: ["monitoring"]

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: pdf_bot_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    networks:
      - pdf_bot_external
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - pdf-bot
    profiles: ["proxy"]

  # Redis Exporter for monitoring
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: pdf_bot_redis_exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - pdf_bot_internal
    depends_on:
      - redis
    profiles: ["monitoring"]

  # Postgres Exporter for monitoring
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pdf_bot_postgres_exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://pdfbot:password@postgres:5432/pdfbot?sslmode=disable
    networks:
      - pdf_bot_internal
    depends_on:
      - postgres
    profiles: ["monitoring"]

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  bot_sessions:
    driver: local

networks:
  pdf_bot_internal:
    driver: bridge
    internal: true
  pdf_bot_external:
    driver: bridge 